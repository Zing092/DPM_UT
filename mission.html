<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ภารกิจค้นหา | กองป้องกันและบรรเทาสาธารณภัย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
  --primary: #0a2463;
  --primary-mid: #1b3d8f;
  --primary-light: #2563eb;
  --primary-glow: #3b82f6;
  --accent-red: #ef4444;
  --accent-green: #10b981;
  --surface: #ffffff;
  --surface-2: #f0f4ff;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --border: #cbd5e1;
  --border-light: #e2e8f0;
  --shadow-sm: 0 1px 3px rgba(10,36,99,0.1);
  --shadow-md: 0 4px 16px rgba(10,36,99,0.12);
  --shadow-lg: 0 8px 32px rgba(10,36,99,0.16);
  --shadow-xl: 0 20px 60px rgba(10,36,99,0.2);
  --radius: 16px;
  --radius-sm: 10px;
  --topbar-h: 58px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Sarabun', sans-serif;
  background: #0f1a2e;
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ===== TOPBAR ===== */
.topbar {
  height: var(--topbar-h);
  background: linear-gradient(90deg, #020c2e 0%, #0a2463 60%, #1b3d8f 100%);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  padding-top: env(safe-area-inset-top, 0px);
}

.topbar-back {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #fff; font-size: 15px;
  transition: all 0.2s; flex-shrink: 0;
  text-decoration: none;
}
.topbar-back:hover { background: rgba(255,255,255,0.2); }

.topbar-info { flex: 1; min-width: 0; }
.topbar-title {
  font-family: 'Kanit', sans-serif;
  font-size: 15px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.topbar-sub { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 1px; }

.topbar-live {
  display: inline-flex; align-items: center; gap: 5px;
  background: #dcfce7; color: #166534; font-size: 10px; font-weight: 700;
  padding: 3px 9px; border-radius: 20px; flex-shrink: 0;
}
.topbar-live::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: #16a34a;
  animation: dot-blink 1.5s infinite;
}
@keyframes dot-blink {
  0%,100% { opacity:1; } 50% { opacity:0.3; }
}

/* ===== BODY LAYOUT ===== */
.page-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface-2);
}

/* ===== SOS BAR ===== */
.sos-bar {
  display: flex; gap: 10px;
  padding: 10px 14px;
  background: #fff;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}
.sos-btn {
  flex: 1; padding: 13px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #dc2626, #ef4444);
  color: #fff; font-size: 15px; font-weight: 800; font-family: 'Kanit', sans-serif;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 16px rgba(239,68,68,0.4); transition: all 0.2s;
  -webkit-user-select: none; user-select: none;
  touch-action: none;
  -webkit-touch-callout: none;
}
.sos-btn:active { transform: scale(0.97); }
.sos-cancel-btn {
  flex: 1; padding: 13px; border: 2.5px solid #dc2626; border-radius: 12px;
  background: #fff; color: #dc2626; font-size: 14px; font-weight: 800;
  font-family: 'Kanit', sans-serif; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
  box-shadow: 0 0 0 3px rgba(220,38,38,0.2);
}
.sos-cancel-btn:active { background: #fef2f2; }
.center-map-btn {
  padding: 13px 16px; border: 1px solid var(--border); border-radius: 12px;
  background: #fff; color: var(--primary); font-size: 12px; cursor: pointer;
  font-family: 'Sarabun', sans-serif; font-weight: 600; transition: all 0.2s;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.center-map-btn:hover { background: var(--surface-2); }

/* ===== MEMBER PANEL ===== */
.member-panel {
  background: #fff;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
  overflow: hidden;
}
.member-panel-header {
  background: linear-gradient(135deg, #064e3b, #065f46);
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  transition: background 0.3s;
}
@keyframes sos-header-flash {
  0%,100% { background: linear-gradient(135deg,#7f1d1d,#991b1b); }
  50%      { background: linear-gradient(135deg,#dc2626,#ef4444); }
}
.member-panel-header.sos-alert { animation: sos-header-flash 0.8s ease-in-out infinite; }
.member-panel-title { font-family: 'Kanit', sans-serif; font-size: 13px; color: #fff; font-weight: 700; }
.panel-toggle {
  background: none; border: none; color: rgba(255,255,255,0.8);
  font-size: 12px; cursor: pointer; padding: 0; line-height: 1;
  transition: transform 0.25s;
}
.panel-toggle.collapsed { transform: rotate(-90deg); }
.member-list {
  max-height: 180px;
  overflow-y: auto;
  transition: max-height 0.3s ease, opacity 0.2s ease;
}
.member-list.collapsed { max-height: 0 !important; overflow: hidden; opacity: 0; }
.member-row {
  display: flex; align-items: center; gap: 10px; padding: 9px 14px;
  border-bottom: 1px solid var(--border-light); transition: background 0.15s;
}
.member-row:hover { background: var(--surface-2); }
.member-row:last-child { border-bottom: none; }
@keyframes sos-row-flash {
  0%,100% { background: #fff1f1; } 50% { background: #fecaca; }
}
.member-row.sos-alert { animation: sos-row-flash 0.8s ease-in-out infinite; border-left: 4px solid #dc2626 !important; }
.member-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.member-dot.online  { background:#22c55e; box-shadow:0 0 0 3px rgba(34,197,94,0.2); animation:dot-blink 2s infinite; }
.member-dot.moving  { background:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.2); animation:dot-blink 1s infinite; }
.member-dot.sos     { background:#ef4444; box-shadow:0 0 0 4px rgba(239,68,68,0.3); animation:dot-blink 0.5s infinite; }
.member-dot.offline { background:#94a3b8; }
.member-avatar {
  width: 32px; height: 32px; border-radius: 9px;
  background: linear-gradient(135deg,#3b82f6,#06b6d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.member-info { flex: 1; min-width: 0; }
.member-name { font-size: 13px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; flex-wrap: wrap; gap: 3px; }
.member-status { font-size: 11px; color: var(--text-muted); }
.member-actions { display: flex; gap: 5px; }
.locate-btn {
  padding: 5px 9px; background: var(--surface-2);
  border: 1px solid var(--border-light); border-radius: 7px;
  font-size: 11px; cursor: pointer; color: var(--primary-light);
  font-family: 'Sarabun', sans-serif; font-weight: 600; transition: all 0.15s;
}
.locate-btn:hover { background: #eff6ff; }

/* ===== MAP ===== */
#track-map {
  flex: 1;
  min-height: 200px;
}

/* ===== BOTTOM ACTION BAR ===== */
.bottom-bar {
  background: #fff;
  border-top: 1px solid var(--border-light);
  padding: 10px 14px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  flex-shrink: 0;
  display: flex;
  gap: 8px;
}
.leave-btn {
  flex: 1; padding: 12px; border: 2px solid #fecaca;
  border-radius: 12px; background: #fff; color: var(--accent-red);
  font-size: 14px; font-weight: 700; font-family: 'Kanit', sans-serif;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s;
}
.leave-btn:hover { background: #fef2f2; }
.end-mission-btn {
  flex: 1; padding: 12px; border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #fff; font-size: 14px; font-weight: 700; font-family: 'Kanit', sans-serif;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 14px rgba(124,58,237,0.35); transition: all 0.2s;
}
.end-mission-btn:hover { transform: translateY(-1px); }

/* ===== LOADING / ERROR SCREENS ===== */
.screen-center {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; padding: 32px;
  text-align: center;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(37,99,235,0.15);
  border-top-color: var(--primary-light);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.screen-title { font-family: 'Kanit', sans-serif; font-size: 17px; font-weight: 700; color: var(--primary); }
.screen-sub { font-size: 13px; color: var(--text-muted); }
.btn-retry {
  padding: 12px 28px; border-radius: 12px;
  background: var(--primary-light); color: #fff; border: none;
  font-size: 14px; font-weight: 700; font-family: 'Sarabun', sans-serif;
  cursor: pointer; margin-top: 8px;
}

/* ===== TOAST ===== */
.toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: #1e293b; color: #fff; padding: 11px 18px; border-radius: 12px;
  font-size: 13px; z-index: 3000; opacity: 0; transition: all 0.3s;
  white-space: nowrap; box-shadow: var(--shadow-xl);
  display: flex; align-items: center; gap: 8px; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success i { color: #10b981; }
.toast.error   i { color: #ef4444; }
.toast.info    i { color: #3b82f6; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000;
  display: none; align-items: flex-end; justify-content: center; padding: 16px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 24px 24px 16px 16px;
  width: 100%; max-width: 560px; max-height: 90vh;
  overflow-y: auto; padding: 22px;
  animation: modal-up 0.3s cubic-bezier(0.16,1,0.3,1);
}
@keyframes modal-up {
  from { opacity:0; transform:translateY(40px); }
  to   { opacity:1; transform:translateY(0); }
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
}
.modal-title { font-family: 'Kanit', sans-serif; font-size: 17px; font-weight: 700; color: var(--primary); }
.btn-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface-2); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 15px; transition: all 0.2s;
}
.btn-close:hover { background: var(--surface-2); color: var(--text-primary); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.form-control {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 14px; font-family: 'Sarabun', sans-serif;
  outline: none; transition: border-color 0.2s;
}
.form-control:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
textarea.form-control { min-height: 90px; resize: vertical; }
.btn { padding: 12px 18px; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: 'Sarabun', sans-serif; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, var(--primary-light), var(--primary-glow)); color: #fff; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
.btn-primary:hover { transform: translateY(-1px); }
.btn-secondary { background: var(--surface-2); color: var(--text-secondary); border: 1.5px solid var(--border); }
.btn-purple { background: linear-gradient(135deg,#7c3aed,#6d28d9); color: #fff; box-shadow: 0 4px 14px rgba(124,58,237,0.35); }
.btn-block { width: 100%; justify-content: center; }
.btn-group-row { display: flex; gap: 10px; }
.req { color: var(--accent-red); margin-left: 2px; }

/* Photo upload area */
.photo-upload-area {
  border: 2px dashed var(--border); border-radius: 12px;
  padding: 20px; text-align: center; cursor: pointer;
  transition: all 0.2s; background: #fafbff;
}
.photo-upload-area:hover, .photo-upload-area.dragover { border-color: var(--primary-light); background: #eff6ff; }
.photo-upload-area input { display: none; }
.photo-upload-icon { font-size: 28px; color: var(--primary-light); opacity: 0.6; margin-bottom: 8px; }
.photo-upload-text { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
.photo-upload-hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.photo-preview-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.photo-preview-item {
  position: relative; width: 72px; height: 72px; border-radius: 9px;
  overflow: hidden; border: 1.5px solid var(--border-light);
}
.photo-preview-item img { width: 100%; height: 100%; object-fit: cover; }
.photo-preview-remove {
  position: absolute; top: 3px; right: 3px; width: 18px; height: 18px;
  border-radius: 50%; background: rgba(239,68,68,0.9); color: #fff;
  border: none; cursor: pointer; font-size: 9px;
  display: flex; align-items: center; justify-content: center;
}

/* ===== MAP POPUP ===== */
.leaflet-popup-content-wrapper {
  border-radius: 14px !important; box-shadow: var(--shadow-lg) !important;
  font-family: 'Sarabun', sans-serif !important;
}
.map-popup-title { font-family: 'Kanit', sans-serif; font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
.map-popup-row { font-size: 12px; color: var(--text-secondary); margin-bottom: 3px; }

/* ===== NAV SHEET (bottom navigation modal) ===== */
#nav-sheet {
  position: fixed; inset: 0; z-index: 99999;
  display: flex; align-items: flex-end; justify-content: center;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
}
#nav-sheet .sheet-inner {
  background: #fff; border-radius: 24px 24px 0 0;
  padding: 24px 20px 36px; width: 100%; max-width: 480px;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
  font-family: 'Sarabun', sans-serif;
  animation: modal-up 0.25s cubic-bezier(0.16,1,0.3,1);
}

/* ===== PULSE for SOS marker ===== */
@keyframes sos-pulse {
  0% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.4); opacity:0.5; }
  100% { transform:scale(1); opacity:1; }
}
.sos-marker-pulse { animation: sos-pulse 0.8s ease-in-out infinite; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #f1f5f9; }
::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }

@media (max-width: 480px) {
  .topbar-title { font-size: 13px; }
  .sos-btn { font-size: 14px; padding: 12px; }
  .member-list { max-height: 150px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar" id="topbar">
  <a href="index.html" class="topbar-back" id="btn-back" onclick="handleBack(event)">
    <i class="fas fa-arrow-left"></i>
  </a>
  <div class="topbar-info">
    <div class="topbar-title" id="mission-title">กำลังโหลด...</div>
    <div class="topbar-sub" id="mission-area"></div>
  </div>
  <span class="topbar-live" id="live-badge" style="display:none">LIVE</span>
</div>

<!-- LOADING SCREEN -->
<div class="page-body" id="screen-loading">
  <div class="screen-center">
    <div class="spinner"></div>
    <div class="screen-title">กำลังเชื่อมต่อ</div>
    <div class="screen-sub">โหลดข้อมูลภารกิจ...</div>
  </div>
</div>

<!-- ERROR SCREEN -->
<div class="page-body" id="screen-error" style="display:none">
  <div class="screen-center">
    <i class="fas fa-exclamation-triangle" style="font-size:48px;color:#f59e0b"></i>
    <div class="screen-title" id="error-title">เกิดข้อผิดพลาด</div>
    <div class="screen-sub" id="error-msg">ไม่สามารถโหลดข้อมูลภารกิจได้</div>
    <button class="btn-retry" onclick="location.href='index.html'">
      <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
    </button>
  </div>
</div>

<!-- MAIN MISSION SCREEN -->
<div class="page-body" id="screen-main" style="display:none">

  <!-- SOS Bar -->
  <div class="sos-bar">
    <button class="sos-btn" id="sos-btn">
      <i class="fas fa-exclamation-triangle"></i> SOS ฉุกเฉิน
    </button>
    <button class="sos-cancel-btn" id="sos-cancel-btn" style="display:none" onclick="cancelSos()">
      <i class="fas fa-times-circle"></i> ยกเลิก SOS
    </button>
    <button class="center-map-btn" onclick="centerMap()">
      <i class="fas fa-compress-arrows-alt"></i> ดูทีม
    </button>
  </div>

  <!-- Member Panel -->
  <div class="member-panel">
    <div class="member-panel-header" id="member-panel-header" onclick="toggleMemberPanel()">
      <div class="member-panel-title">
        <i class="fas fa-users" style="margin-right:6px"></i>สมาชิกในทีม
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div id="online-count" style="font-size:11px;color:rgba(255,255,255,0.7)">0 ออนไลน์</div>
        <button class="panel-toggle" id="panel-toggle-btn"><i class="fas fa-chevron-down"></i></button>
      </div>
    </div>
    <div class="member-list" id="member-list"></div>
  </div>

  <!-- Map -->
  <div id="track-map"></div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <button class="leave-btn" onclick="confirmLeave()">
      <i class="fas fa-sign-out-alt"></i> ออกจากภารกิจ
    </button>
    <button class="end-mission-btn" id="end-mission-btn" style="display:none" onclick="showEndModal()">
      <i class="fas fa-flag-checkered"></i> จบภารกิจ
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- END MISSION MODAL -->
<div class="modal-overlay" id="modal-end">
  <div class="modal" style="display:flex;flex-direction:column;padding:0;overflow:hidden;max-width:520px">
    <div class="modal-header" style="padding:18px 20px 14px;border-bottom:1px solid var(--border-light);margin-bottom:0;flex-shrink:0">
      <div class="modal-title"><i class="fas fa-flag-checkered" style="color:#7c3aed;margin-right:6px"></i>จบภารกิจ</div>
      <button class="btn-close" onclick="closeModal('modal-end')"><i class="fas fa-times"></i></button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch">
      <div style="background:#faf5ff;border:1.5px solid #d8b4fe;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#6b21a8;">
        <i class="fas fa-info-circle" style="margin-right:6px"></i>
        เมื่อจบภารกิจแล้ว ระบบจะหยุดติดตาม GPS ของทุกคน และบันทึกไว้ในประวัติ
      </div>
      <div class="form-group">
        <label>สรุปผลภารกิจ<span class="req">*</span></label>
        <textarea class="form-control" id="end-summary"
          placeholder="สรุปผลการปฏิบัติงาน เช่น พบผู้สูญหายแล้ว / ไม่พบผู้สูญหาย..."
          style="min-height:90px"></textarea>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>รูปภาพประกอบ <span style="font-weight:400;font-size:11px;color:var(--text-muted)">(ไม่บังคับ, สูงสุด 5 รูป)</span></label>
        <div class="photo-upload-area" id="photo-drop" onclick="document.getElementById('photo-input').click()">
          <input type="file" id="photo-input" accept="image/*" multiple onchange="handlePhotoSelect(event)">
          <div class="photo-upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
          <div class="photo-upload-text">แตะเพื่อเลือกรูปภาพ</div>
          <div class="photo-upload-hint">รองรับ JPG, PNG • สูงสุด 10 MB ต่อรูป</div>
        </div>
        <div class="photo-preview-grid" id="photo-preview"></div>
      </div>
    </div>
    <div style="flex-shrink:0;padding:10px 20px 16px;border-top:1px solid var(--border-light);background:#fff;border-radius:0 0 16px 16px">
      <div class="btn-group-row">
        <button class="btn btn-purple btn-block" id="end-confirm-btn" onclick="endMission()">
          <i class="fas fa-flag-checkered"></i> ยืนยันจบภารกิจ
        </button>
        <button class="btn btn-secondary" onclick="closeModal('modal-end')" style="min-width:80px">ยกเลิก</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, update, remove, onValue, push }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ── Firebase Config (same as index.html) ──────────────────
const firebaseConfig = {
  apiKey: "AIzaSyD4i4tIdswvYaRLP3EpEHHg_miOJIu-k7o",
  authDomain: "fire-rescue-app-f03d5.firebaseapp.com",
  databaseURL: "https://fire-rescue-app-f03d5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fire-rescue-app-f03d5",
  storageBucket: "fire-rescue-app-f03d5.firebasestorage.app",
  messagingSenderId: "320085960767",
  appId: "1:320085960767:web:a69ebd5b441f49a580b08a"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── State ─────────────────────────────────────────────────
const params     = new URLSearchParams(location.search);
const missionId  = params.get('id');
const user       = (() => { try { return JSON.parse(localStorage.getItem('fire_user')); } catch{ return null; } })();

let _map          = null;
let _markers      = {};
let _watchId      = null;
let _bgInterval   = null;
let _locListener  = null;
let _memListener  = null;
let _statusListener = null;
let _hasCentered  = false;
let _gpsActive    = false;
let _sosActive    = false;
let _sosExpiry    = 0;
let _sosTimer     = null;
let _missionData  = null;
let _pendingPhotos = [];

// ── Guard: must be logged in and have missionId ───────────
if(!user) {
  location.replace('index.html');
  throw new Error('no session');
}
if(!missionId) {
  showError('ไม่พบรหัสภารกิจ', 'กรุณาเข้าร่วมภารกิจใหม่จากหน้าหลัก');
  throw new Error('no missionId');
}

// expose for inline handlers
window.cancelSos       = cancelSos;
window.centerMap       = centerMap;
window.confirmLeave    = confirmLeave;
window.showEndModal    = showEndModal;
window.closeModal      = closeModal;
window.endMission      = endMission;
window.handlePhotoSelect = handlePhotoSelect;
window.removePhoto     = removePhoto;
window.toggleMemberPanel = toggleMemberPanel;
window.handleBack      = handleBack;
window.smFlyTo         = (lat,lng) => { if(_map) _map.flyTo([lat,lng],17,{animate:true,duration:0.8}); };
window.showNavOptions  = showNavOptions;

// ── Init ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', init);

async function init() {
  try {
    const snap = await get(ref(db, `search_missions/${missionId}`));
    const m = snap.val();
    if(!m) { showError('ไม่พบภารกิจ', 'ภารกิจนี้อาจถูกลบแล้ว'); return; }
    if(m.status === 'closed') { showError('ภารกิจสิ้นสุดแล้ว', 'ภารกิจนี้ปิดไปแล้ว กรุณากลับหน้าหลัก'); return; }
    _missionData = m;

    // Update topbar
    document.getElementById('mission-title').textContent = m.title || 'ภารกิจค้นหา';
    document.getElementById('mission-area').textContent  = m.area  || '';
    document.getElementById('live-badge').style.display  = 'inline-flex';

    // Show end button if creator or admin
    const canEnd = m.createdBy === user.id || user.role === 'admin';
    if(canEnd) document.getElementById('end-mission-btn').style.display = 'flex';

    // Join if not already a member
    const memberSnap = await get(ref(db, `search_missions/${missionId}/members/${user.id}`));
    if(!memberSnap.exists()) {
      await set(ref(db, `search_missions/${missionId}/members/${user.id}`), {
        userId: user.id, empId: user.id,
        name: user.name || user.id,
        joinedAt: Date.now(), status: 'online'
      });
    }

    // Show main screen
    document.getElementById('screen-loading').style.display = 'none';
    document.getElementById('screen-main').style.display    = 'flex';

    // Init map
    setTimeout(() => {
      initMap();
      startGps();
      listenLocations();
      listenMissionStatus();
      bindSosBtn();
      startHeartbeat();
    }, 150);

  } catch(e) {
    showError('เกิดข้อผิดพลาด', e.message || 'ไม่สามารถโหลดภารกิจได้');
  }
}

// ── Error screen ──────────────────────────────────────────
function showError(title, msg) {
  document.getElementById('screen-loading').style.display = 'none';
  document.getElementById('screen-main').style.display    = 'none';
  document.getElementById('screen-error').style.display   = 'flex';
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-msg').textContent   = msg;
}

// ── Map ───────────────────────────────────────────────────
function initMap() {
  const el = document.getElementById('track-map');
  if(!el) return;
  if(_map) { _map.remove(); _map = null; _markers = {}; }
  _map = L.map('track-map', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19, attribution:'© OpenStreetMap'
  }).addTo(_map);
  _map.setView([15.7, 100.0], 13);
}

// ── GPS ───────────────────────────────────────────────────
function startGps() {
  if(!navigator.geolocation) { showToast('อุปกรณ์ไม่รองรับ GPS','error'); return; }
  stopGps();
  _hasCentered = false;
  _gpsActive   = true;

  const locRef    = ref(db, `search_missions/${missionId}/locations/${user.id}`);
  const memberRef = ref(db, `search_missions/${missionId}/members/${user.id}`);

  _watchId = navigator.geolocation.watchPosition(
    pos => {
      if(!_gpsActive) return;
      if(_sosActive && Date.now() < _sosExpiry) return;
      const { latitude:lat, longitude:lng, heading, speed } = pos.coords;
      const spd    = speed || 0;
      const status = spd > 0.5 ? 'moving' : 'online';
      const payload = { lat, lng, heading: heading||0, speed: Math.round(spd*3.6), status, ts: Date.now() };
      set(locRef, payload).catch(()=>{});
      pushLocationRest(lat, lng, speed, heading);
      update(memberRef, { status, lastSeen: Date.now() }).catch(()=>{});
      if(_map && !_hasCentered) { _map.setView([lat,lng],16); _hasCentered = true; }
    },
    err => {
      if(err.code === 1) showToast('กรุณาอนุญาต GPS ในการตั้งค่าเบราว์เซอร์','error');
    },
    { enableHighAccuracy:true, maximumAge:5000, timeout:20000 }
  );

  // Background interval
  _bgInterval = setInterval(() => {
    if(!_gpsActive) { clearInterval(_bgInterval); return; }
    navigator.geolocation.getCurrentPosition(
      pos => pushLocationRest(pos.coords.latitude, pos.coords.longitude, pos.coords.speed, pos.coords.heading),
      ()=>{},
      { enableHighAccuracy:true, timeout:8000, maximumAge:10000 }
    );
  }, 15000);
}

function stopGps() {
  _gpsActive = false;
  if(_watchId !== null) { navigator.geolocation.clearWatch(_watchId); _watchId = null; }
  if(_bgInterval !== null) { clearInterval(_bgInterval); _bgInterval = null; }
  _hasCentered = false;
}

function pushLocationRest(lat, lng, speed, heading) {
  if(!_gpsActive || !lat) return;
  if(_sosActive && Date.now() < _sosExpiry) return;
  try {
    const base  = firebaseConfig.databaseURL;
    const spd   = speed || 0;
    const status = spd > 0.5 ? 'moving' : 'online';
    const payload = JSON.stringify({ lat, lng, heading:heading||0, speed:Math.round(spd*3.6), status, ts:Date.now() });
    fetch(`${base}/search_missions/${missionId}/locations/${user.id}.json`, { method:'PUT', body:payload }).catch(()=>{});
    fetch(`${base}/search_missions/${missionId}/members/${user.id}/lastSeen.json`, { method:'PUT', body:JSON.stringify(Date.now()) }).catch(()=>{});
  } catch(e){}
}

// ── Realtime Listeners ────────────────────────────────────
function listenLocations() {
  if(_locListener) { _locListener(); _locListener = null; }
  if(_memListener) { _memListener(); _memListener = null; }

  let _locs = {}, _mems = {};
  function rerender() { renderMarkers(_locs, _mems); renderMemberPanel(_locs, _mems); }

  _locListener = onValue(ref(db, `search_missions/${missionId}/locations`), snap => {
    _locs = snap.val() || {}; rerender();
  });
  _memListener = onValue(ref(db, `search_missions/${missionId}/members`), snap => {
    _mems = snap.val() || {}; rerender();
  });
}

function listenMissionStatus() {
  if(_statusListener) { _statusListener(); _statusListener = null; }
  _statusListener = onValue(ref(db, `search_missions/${missionId}/status`), snap => {
    if(snap.val() === 'closed') {
      if(_statusListener) { _statusListener(); _statusListener = null; }
      if(_locListener)    { _locListener();    _locListener    = null; }
      if(_memListener)    { _memListener();    _memListener    = null; }
      stopGps();
      showToast('ภารกิจสิ้นสุดแล้ว — ระบบหยุดติดตาม GPS','info');
      setTimeout(() => location.replace('index.html?tab=search-mission'), 2000);
    }
  });
}

// ── Heartbeat ─────────────────────────────────────────────
function startHeartbeat() {
  setInterval(() => {
    if(!_gpsActive) return;
    const isSosNow = _sosActive && Date.now() < _sosExpiry;
    update(ref(db, `search_missions/${missionId}/members/${user.id}`),
           { lastSeen: Date.now(), status: isSosNow ? 'sos' : 'online' }).catch(()=>{});
  }, 25000);
}

// ── Markers ───────────────────────────────────────────────
const COLORS = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#6366f1'];
function getColor(idx) { return COLORS[idx % COLORS.length]; }

function makeMarkerIcon(label, color, status) {
  const pulse = status === 'sos' ? 'sos-marker-pulse' : '';
  const bg = status === 'sos' ? '#dc2626' : status === 'offline' ? '#94a3b8' : color;
  const ring = status === 'online' ? `box-shadow:0 0 0 3px ${color}55,0 2px 8px rgba(0,0,0,0.3)` : 'box-shadow:0 2px 8px rgba(0,0,0,0.3)';
  return L.divIcon({
    html: `<div class="${pulse}" style="
      width:32px;height:32px;border-radius:50%;background:${bg};
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:12px;font-weight:800;font-family:'Kanit',sans-serif;
      border:2.5px solid #fff;${ring}">
      ${status === 'sos' ? '🆘' : label.slice(0,2)}
    </div>`,
    className: '', iconSize:[32,32], iconAnchor:[16,16]
  });
}

function renderMarkers(locs, members) {
  if(!_map) return;
  const now = Date.now();
  const allUids = new Set([...Object.keys(locs), ...Object.keys(members)]);

  allUids.forEach((uid,idx) => {
    const loc = locs[uid];
    const mem = members[uid] || {};
    const empId = mem.empId || uid.slice(-6);
    const color = getColor(idx);
    let status = 'offline';
    if(loc) {
      const age = now - (loc.ts||0);
      if(mem.status === 'sos') status = 'sos';
      else if(age < 120000) status = loc.status || 'online';
    }
    if(!loc) {
      if(_markers[uid]) { _markers[uid].remove(); delete _markers[uid]; }
      return;
    }
    if(_markers[uid]) {
      _markers[uid].setLatLng([loc.lat, loc.lng]);
      _markers[uid].setIcon(makeMarkerIcon(empId, color, status));
    } else {
      _markers[uid] = L.marker([loc.lat, loc.lng], {
        icon: makeMarkerIcon(empId, color, status),
        zIndexOffset: uid === user.id ? 1000 : 0
      }).addTo(_map);
    }
    const isSelf  = uid === user.id;
    const lastSeen = loc.ts ? timeAgo(loc.ts) : '-';
    _markers[uid].bindPopup(`
      <div class="map-popup-title">${isSelf ? '📍 คุณ' : '👤'} ${mem.name||empId}</div>
      <div class="map-popup-row">รหัส: <b>${empId}</b></div>
      <div class="map-popup-row">สถานะ: <b>${statusLabel(status)}</b></div>
      ${loc.speed !== undefined ? `<div class="map-popup-row">ความเร็ว: <b>${loc.speed} กม./ชม.</b></div>` : ''}
      <div class="map-popup-row">อัปเดต: <b>${lastSeen}</b></div>
      ${status==='sos' ? '<div style="background:#fef2f2;color:#dc2626;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:700;margin-top:6px">🆘 ขอความช่วยเหลือ!</div>' : ''}
    `);
  });
  Object.keys(_markers).forEach(uid => {
    if(!allUids.has(uid)) { _markers[uid].remove(); delete _markers[uid]; }
  });
}

function renderMemberPanel(locs, members) {
  const listEl    = document.getElementById('member-list');
  const onlineEl  = document.getElementById('online-count');
  const headerEl  = document.getElementById('member-panel-header');
  if(!listEl) return;

  const now    = Date.now();
  const myLoc  = locs[user.id];
  const entries= Object.entries(members);

  const rows = entries.map(([uid,mem],idx) => {
    const loc    = locs[uid];
    const color  = getColor(idx);
    let status   = 'offline';
    if(loc) {
      if(mem.status === 'sos') status = 'sos';
      else if((now-(loc.ts||0)) < 120000) status = loc.status || 'online';
    }
    const isSelf  = uid === user.id;
    const lastSeen = loc?.ts ? timeAgo(loc.ts) : 'ออฟไลน์';
    const spd      = loc?.speed !== undefined ? ` · ${loc.speed} กม./ชม.` : '';

    let distBadge = '';
    if(!isSelf && myLoc && loc?.lat) {
      const dist = calcDist(myLoc.lat, myLoc.lng, loc.lat, loc.lng);
      const dc   = dist < 100 ? '#10b981' : dist < 500 ? '#f59e0b' : '#ef4444';
      distBadge  = `<span style="font-size:10px;font-weight:700;color:${dc};background:${dc}18;border-radius:5px;padding:2px 5px;margin-left:3px;">${fmtDist(dist)}</span>`;
    }
    const coordLine = (loc?.lat) ? `<div style="font-size:10px;color:#94a3b8;font-family:monospace;">📍${loc.lat.toFixed(5)},${loc.lng.toFixed(5)}</div>` : '';

    return `
      <div class="member-row${status==='sos'?' sos-alert':''}">
        <div class="member-dot ${status}"></div>
        <div class="member-avatar" style="background:linear-gradient(135deg,${color},${color}99)">${(mem.name||'?').charAt(0)}</div>
        <div class="member-info">
          <div class="member-name">
            ${isSelf?'👤 คุณ':''} ${mem.name||mem.empId||uid.slice(-6)}${distBadge}
            ${status==='sos'?'<span style="font-size:10px;font-weight:800;color:#dc2626;background:#fee2e2;border-radius:4px;padding:1px 5px">🆘SOS!</span>':''}
          </div>
          <div class="member-status">${statusLabel(status)}${spd} · ${lastSeen}</div>
          ${coordLine}
        </div>
        <div class="member-actions">
          ${loc ? `<button class="locate-btn" onclick="smFlyTo(${loc.lat},${loc.lng})" title="โฟกัส"><i class="fas fa-crosshairs"></i></button>` : ''}
          ${(!isSelf && loc?.lat) ? `<button onclick="showNavOptions(${loc.lat},${loc.lng},'${(mem.name||'สมาชิก').replace(/'/g,'')}')'" class="locate-btn" style="color:#10b981;border-color:#10b981" title="นำทาง"><i class="fas fa-directions"></i></button>` : ''}
        </div>
      </div>`;
  });

  listEl.innerHTML = rows.length ? rows.join('') : '<div style="padding:14px;text-align:center;color:var(--text-muted);font-size:12px">ยังไม่มีสมาชิก</div>';

  const hasSos      = Object.values(members).some(m => m.status === 'sos');
  const hasSosOther = Object.entries(members).some(([uid,m]) => m.status === 'sos' && uid !== user.id);
  if(headerEl) headerEl.classList.toggle('sos-alert', hasSos);
  if(hasSosOther && listEl.classList.contains('collapsed')) {
    listEl.classList.remove('collapsed');
    document.getElementById('panel-toggle-btn')?.classList.remove('collapsed');
  }
  if(hasSosOther && !listEl._lastSosAlert) {
    listEl._lastSosAlert = true;
    if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
  } else if(!hasSosOther) { listEl._lastSosAlert = false; }

  const onlineCount = Object.values(members).filter((_,i) => {
    const uid = Object.keys(members)[i];
    const loc = locs[uid];
    return loc && (Date.now()-(loc.ts||0)) < 120000;
  }).length;
  if(onlineEl) onlineEl.textContent = `${onlineCount} ออนไลน์`;
}

// ── SOS ───────────────────────────────────────────────────
function bindSosBtn() {
  const btn = document.getElementById('sos-btn');
  if(!btn || btn._bound) return;
  btn._bound = true;
  function onStart(e) {
    e.preventDefault();
    btn.style.opacity = '0.7';
    btn.textContent = '🆘 กดค้างไว้ 3 วิ...';
    if(navigator.vibrate) navigator.vibrate(50);
    clearTimeout(_sosTimer);
    _sosTimer = setTimeout(triggerSos, 3000);
  }
  function onEnd() {
    clearTimeout(_sosTimer);
    if(!_sosActive) { btn.style.opacity='1'; btn.innerHTML='<i class="fas fa-exclamation-triangle"></i> SOS ฉุกเฉิน'; }
  }
  btn.addEventListener('touchstart',  onStart, {passive:false});
  btn.addEventListener('touchend',    onEnd,   {passive:true});
  btn.addEventListener('touchcancel', onEnd,   {passive:true});
  btn.addEventListener('mousedown',   onStart, {passive:false});
  btn.addEventListener('mouseup',     onEnd,   {passive:true});
  btn.addEventListener('mouseleave',  onEnd,   {passive:true});
}

async function triggerSos() {
  const btn = document.getElementById('sos-btn');
  if(btn) { btn.style.opacity='1'; btn.innerHTML='<i class="fas fa-exclamation-triangle"></i> SOS ส่งแล้ว!'; btn.style.background='#7f1d1d'; }
  _sosActive = true; _sosExpiry = Date.now() + 60000;
  try {
    await Promise.all([
      update(ref(db, `search_missions/${missionId}/members/${user.id}`), { status:'sos', sosAt:Date.now() }),
      update(ref(db, `search_missions/${missionId}/locations/${user.id}`), { status:'sos', ts:Date.now() })
    ]);
  } catch(e){}
  showToast('🆘 ส่ง SOS แล้ว! ทีมจะเห็นตำแหน่งคุณ','error');
  const cancelBtn = document.getElementById('sos-cancel-btn');
  const sosBtn    = document.getElementById('sos-btn');
  if(cancelBtn) { cancelBtn.style.display='flex'; }
  if(sosBtn)    sosBtn.style.display='none';
  setTimeout(() => { _sosActive=false; _sosExpiry=0; restoreSosBtn(); }, 60000);
}

function cancelSos() {
  if(!confirm('ยืนยันการยกเลิก SOS?')) return;
  _sosActive = false; _sosExpiry = 0;
  Promise.all([
    update(ref(db, `search_missions/${missionId}/members/${user.id}`), { status:'online', sosAt:null }),
    update(ref(db, `search_missions/${missionId}/locations/${user.id}`), { status:'online' })
  ]).catch(()=>{});
  showToast('ยกเลิก SOS แล้ว','info');
  restoreSosBtn();
}

function restoreSosBtn() {
  document.getElementById('sos-cancel-btn').style.display = 'none';
  const btn = document.getElementById('sos-btn');
  btn.style.display   = 'flex';
  btn.style.background = '';
  btn.style.opacity    = '1';
  btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> SOS ฉุกเฉิน';
}

// ── Map controls ──────────────────────────────────────────
function centerMap() {
  if(!_map) return;
  const ms = Object.values(_markers);
  if(!ms.length) { showToast('ยังไม่มีตำแหน่งทีม','info'); return; }
  _map.fitBounds(L.featureGroup(ms).getBounds().pad(0.2));
}

// ── Toggle panel ──────────────────────────────────────────
function toggleMemberPanel() {
  const list   = document.getElementById('member-list');
  const toggle = document.getElementById('panel-toggle-btn');
  if(!list) return;
  const isCollapsed = list.classList.toggle('collapsed');
  if(toggle) toggle.classList.toggle('collapsed', isCollapsed);
}

// ── Leave ─────────────────────────────────────────────────
function confirmLeave() {
  if(!confirm('ยืนยันออกจากภารกิจ?\nระบบจะหยุดส่งตำแหน่งของคุณ')) return;
  _gpsActive = false;
  stopGps();
  if(_locListener)    { _locListener();    _locListener    = null; }
  if(_memListener)    { _memListener();    _memListener    = null; }
  if(_statusListener) { _statusListener(); _statusListener = null; }
  Promise.all([
    remove(ref(db, `search_missions/${missionId}/members/${user.id}`)),
    remove(ref(db, `search_missions/${missionId}/locations/${user.id}`))
  ]).catch(()=>{});
  localStorage.removeItem('sm_active_mission');
  location.replace('index.html?tab=search-mission');
}

// ── End Mission ───────────────────────────────────────────
function showEndModal() {
  _pendingPhotos = [];
  renderPhotoPreviews();
  setEndBtnLoading(false);
  openModal('modal-end');
}

async function endMission() {
  const summary = document.getElementById('end-summary')?.value?.trim();
  if(!summary) { showToast('กรุณากรอกสรุปผลภารกิจ','error'); return; }
  setEndBtnLoading(true);
  try {
    const snap    = await get(ref(db, `search_missions/${missionId}`));
    const mission = snap.val() || {};
    const canEnd  = mission.createdBy === user.id || user.role === 'admin';
    if(!canEnd) { showToast('ไม่มีสิทธิ์จบภารกิจ','error'); setEndBtnLoading(false); return; }

    const memberSnapshot = mission.members ? JSON.parse(JSON.stringify(mission.members)) : {};
    const photos = _pendingPhotos.filter(p=>!p.loading && p.dataUrl).map(p=>({ data:p.dataUrl, size:p.compSize||0 }));

    await update(ref(db, `search_missions/${missionId}`), {
      status:'closed', closedAt:Date.now(),
      closedBy: user.id, closedByName: user.name || user.id,
      summary, memberSnapshot,
      ...(photos.length > 0 && { photos })
    });
    await remove(ref(db, `search_missions/${missionId}/locations`)).catch(()=>{});

    showToast('จบภารกิจสำเร็จ ✅','success');
    stopGps();
    _gpsActive = false;
    if(_locListener)    { _locListener();    _locListener    = null; }
    if(_memListener)    { _memListener();    _memListener    = null; }
    if(_statusListener) { _statusListener(); _statusListener = null; }
    localStorage.removeItem('sm_active_mission');
    setTimeout(() => location.replace('index.html?tab=search-mission'), 1200);
  } catch(e) {
    showToast('เกิดข้อผิดพลาด: '+e.message,'error');
    setEndBtnLoading(false);
  }
}

function setEndBtnLoading(on) {
  const btn = document.getElementById('end-confirm-btn');
  if(!btn) return;
  btn.disabled = on;
  btn.innerHTML = on ? '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...' : '<i class="fas fa-flag-checkered"></i> ยืนยันจบภารกิจ';
}

// ── Photos ────────────────────────────────────────────────
function handlePhotoSelect(e) {
  addPhotos(Array.from(e.target.files));
  e.target.value = '';
}
async function addPhotos(files) {
  const max  = 5;
  const left = max - _pendingPhotos.length;
  if(left <= 0) { showToast('อัพโหลดได้สูงสุด 5 รูป','error'); return; }
  const toAdd = files.filter(f=>f.type.startsWith('image/')).slice(0,left);
  const si    = _pendingPhotos.length;
  toAdd.forEach(()=> _pendingPhotos.push({ loading:true }));
  renderPhotoPreviews();
  const results = await Promise.all(toAdd.map(f => compressImage(f).catch(()=>null)));
  results.forEach((res,i) => {
    if(res) _pendingPhotos[si+i] = res;
    else    _pendingPhotos.splice(si+i,1);
  });
  renderPhotoPreviews();
}
function compressImage(file, maxPx=1024, quality=0.65) {
  return new Promise((resolve,reject) => {
    const r = new FileReader();
    r.onerror = reject;
    r.onload  = ev => {
      const img = new Image();
      img.onerror = reject;
      img.onload  = () => {
        let {width,height} = img;
        if(width>maxPx||height>maxPx){
          if(width>=height){height=Math.round(height*maxPx/width);width=maxPx;}
          else{width=Math.round(width*maxPx/height);height=maxPx;}
        }
        const c=document.createElement('canvas'); c.width=width; c.height=height;
        const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,width,height);
        ctx.drawImage(img,0,0,width,height);
        c.toBlob(blob=>{
          if(!blob){reject(new Error('blob failed'));return;}
          resolve({ blob, dataUrl:c.toDataURL('image/jpeg',quality), origSize:file.size, compSize:blob.size, loading:false });
        },'image/jpeg',quality);
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  });
}
function renderPhotoPreviews() {
  const grid = document.getElementById('photo-preview');
  if(!grid) return;
  if(!_pendingPhotos.length) { grid.innerHTML=''; return; }
  grid.innerHTML = _pendingPhotos.map((p,i) => p.loading
    ? `<div class="photo-preview-item" style="display:flex;align-items:center;justify-content:center;background:#f1f5f9"><i class="fas fa-spinner fa-spin" style="color:var(--primary-light)"></i></div>`
    : `<div class="photo-preview-item"><img src="${p.dataUrl}"><button class="photo-preview-remove" onclick="removePhoto(${i})"><i class="fas fa-times"></i></button></div>`
  ).join('');
}
function removePhoto(idx) { _pendingPhotos.splice(idx,1); renderPhotoPreviews(); }

      <div style="font-family:monospace;font-size:12px;color:#0369a1;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:7px 12px;margin-bottom:16px;display:flex;align-items:center;gap:8px">

      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}" target="_blank" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;border-radius:14px;border:2px solid #4285f4;text-decoration:none;color:#4285f4;font-family:'Kanit',sans-serif;font-size:13px;font-weight:600">
          <i class="fas fa-map-marked-alt" style="font-size:22px"></i>Google Maps
        </a>
        <a href="https://waze.com/ul?ll=${lat},${lng}&navigate=yes" target="_blank" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;border-radius:14px;border:2px solid #33ccff;text-decoration:none;color:#00b5e6;font-family:'Kanit',sans-serif;font-size:13px;font-weight:600">

// ── Modal helpers ─────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── Toast ─────────────────────────────────────────────────
let _toastTimer = null;
window.showToast = function(msg, type='info') {
  const t = document.getElementById('toast');
  const icons = { success:'check-circle', error:'exclamation-circle', info:'info-circle' };
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="fas fa-${icons[type]||'info-circle'}"></i>${msg}`;
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
};

// ── Back button ───────────────────────────────────────────
function handleBack(e) {
  e.preventDefault();
  if(confirm('กลับหน้าหลัก?\n(GPS จะยังทำงานอยู่ถ้าคุณยังอยู่ในภารกิจ)')) {
    location.replace('index.html?tab=search-mission');
  }
}

// ── Helpers ───────────────────────────────────────────────
function statusLabel(s) {
  return { online:'🟢 ออนไลน์', moving:'🔵 กำลังเดิน', offline:'⚫ ออฟไลน์', sos:'🔴 SOS!' }[s] || s;
}
function timeAgo(ts) {
  const sec = Math.floor((Date.now()-ts)/1000);
  if(sec<10) return 'เพิ่งอัปเดต';
  if(sec<60) return `${sec} วิที่แล้ว`;
  if(sec<3600) return `${Math.floor(sec/60)} นาทีที่แล้ว`;
  return `${Math.floor(sec/3600)} ชม.ที่แล้ว`;
}
function calcDist(lat1,lng1,lat2,lng2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m) { return m<1000?`${Math.round(m)}ม.`:`${(m/1000).toFixed(1)}กม.`; }

// ── Page Lifecycle ────────────────────────────────────────
function beaconLocation() {
  if(!_gpsActive) return;
  try {
    const base = firebaseConfig.databaseURL;
    const isSosNow = _sosActive && Date.now() < _sosExpiry;
    const payload = JSON.stringify({ status: isSosNow?'sos':'online', lastSeen:Date.now(), bgActive:true });
    navigator.sendBeacon(`${base}/search_missions/${missionId}/members/${user.id}.json`, new Blob([payload],{type:'application/json'}));
  } catch(e){}
}
document.addEventListener('visibilitychange', () => {
  if(document.hidden) beaconLocation();
  else if(_gpsActive) startGps();
});
window.addEventListener('pagehide', () => { if(_gpsActive) beaconLocation(); });
window.addEventListener('beforeunload', beaconLocation);
window.addEventListener('freeze', beaconLocation);
window.addEventListener('resume', () => { if(_gpsActive) { stopGps(); startGps(); } });

// Drag & Drop for photos
document.addEventListener('DOMContentLoaded', () => {
  const drop = document.getElementById('photo-drop');
  if(drop) {
    drop.addEventListener('dragover', e=>{ e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', ()=>drop.classList.remove('dragover'));
    drop.addEventListener('drop', e=>{ e.preventDefault(); drop.classList.remove('dragover'); addPhotos(Array.from(e.dataTransfer.files)); });
  }
});
</script>
